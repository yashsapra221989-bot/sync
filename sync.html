<!DOCTYPE html>
<html lang="en">
<head>
<title>Emergency QR Medical ID</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    max-width: 400px;
    width: 100%;
}

h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #555;
}

input[type="text"] {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    padding: 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background-color: #45a049;
}

#qrcode {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>
<div class="container">
<h2>Emergency QR Medical ID</h2>

<form id="medicalForm">
<div class="form-group">
<label for="name">Name:</label>
<input type="text" id="name" placeholder="Enter your full name">
</div>

<div class="form-group">
<label for="blood">Blood Group:</label>
<input type="text" id="blood" placeholder="e.g., O+, A-, etc.">
</div>

<div class="form-group">
<label for="allergy">Allergies:</label>
<input type="text" id="allergy" placeholder="List any allergies">
</div>

<div class="form-group">
<label for="condition">Medical Condition:</label>
<input type="text" id="condition" placeholder="Any medical conditions">
</div>

<div class="form-group">
<label for="contact">Emergency Contact:</label>
<input type="text" id="contact" placeholder="Name and phone number">
</div>

<button type="button" onclick="generateQR()">FACE SCAN</button>
</form>

<div id="qrcode"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>

</body>
</html>
