<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Medical QR Code</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .qr-container {
            background: linear-gradient(to bottom, #ffffff 0%, #f8f9ff 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
            text-align: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-card {
            background-color: rgba(102, 126, 234, 0.05);
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
            animation: fadeIn 0.6s ease-out 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
            text-align: right;
            max-width: 50%;
            word-break: break-word;
        }

        #qrcode {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            margin: 30px 0;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
            animation: fadeIn 0.6s ease-out 0.4s forwards;
            opacity: 0;
        }

        #qrcode canvas {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease-out 0.6s forwards;
            opacity: 0;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-edit {
            background-color: #f0f0f0;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-edit:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .print-btn {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.6);
        }

        .timestamp {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
            font-style: italic;
        }

        /* Toast Notification Styles */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            animation: slideInRight 0.4s ease-out;
            z-index: 1000;
            font-weight: 500;
        }

        .toast.success {
            background: linear-gradient(135deg, #00c853 0%, #00acc1 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #ff5252 0%, #ff6e40 100%);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .qr-container {
                padding: 25px;
            }

            h1 {
                font-size: 22px;
            }

            #qrcode {
                padding: 15px;
            }

            .button-group {
                gap: 8px;
            }

            button {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info-item {
                flex-direction: column;
                gap: 5px;
            }

            .info-value {
                text-align: left;
                max-width: 100%;
            }
        }

        @media print {
            body {
                background: white;
            }

            .qr-container {
                box-shadow: none;
                padding: 20px;
            }

            .button-group {
                display: none;
            }

            .subtitle {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>Your Medical ID</h1>
        <p class="subtitle">Emergency QR Code</p>

        <div class="info-card" id="infoCard">
            <!-- Patient info will be populated here -->
        </div>

        <div id="qrcode"></div>

        <div class="timestamp" id="timestamp"></div>

        <div class="button-group">
            <button class="btn-download" onclick="downloadQR()">Download QR Code</button>
            <button class="print-btn" onclick="window.print()">Print</button>
            <button class="btn-edit" onclick="goBackToForm()">Edit Information</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // Toast notification system
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Load data and generate QR code
        window.addEventListener('DOMContentLoaded', function() {
            loadAndDisplayQR();
        });

        function loadAndDisplayQR() {
            const savedData = localStorage.getItem('medicalData');
            
            if (!savedData) {
                showToast('No medical data found. Redirecting...', 'error');
                setTimeout(() => {
                    window.location.href = 'sync.html';
                }, 2000);
                return;
            }

            try {
                const medicalData = JSON.parse(savedData);
                displayPatientInfo(medicalData);
                generateQRCode(medicalData);
            } catch (error) {
                showToast('Error loading data!', 'error');
                console.error('Error:', error);
            }
        }

        function displayPatientInfo(data) {
            const infoCard = document.getElementById('infoCard');
            let infoHTML = '';

            if (data.name) infoHTML += `<div class="info-item"><span class="info-label">Name:</span><span class="info-value">${escapeHtml(data.name)}</span></div>`;
            if (data.blood) infoHTML += `<div class="info-item"><span class="info-label">Blood Group:</span><span class="info-value">${escapeHtml(data.blood)}</span></div>`;
            if (data.allergy) infoHTML += `<div class="info-item"><span class="info-label">Allergies:</span><span class="info-value">${escapeHtml(data.allergy)}</span></div>`;
            if (data.condition) infoHTML += `<div class="info-item"><span class="info-label">Medical Condition:</span><span class="info-value">${escapeHtml(data.condition)}</span></div>`;
            if (data.contact) infoHTML += `<div class="info-item"><span class="info-label">Emergency Contact:</span><span class="info-value">${escapeHtml(data.contact)}</span></div>`;

            infoCard.innerHTML = infoHTML || '<p style="color: #999;">No additional information provided.</p>';

            // Display timestamp
            if (data.timestamp) {
                const date = new Date(data.timestamp);
                const formattedDate = date.toLocaleString();
                document.getElementById('timestamp').textContent = `Generated: ${formattedDate}`;
            }
        }

        function generateQRCode(data) {
            const qrContainer = document.getElementById('qrcode');
            
            // Check if running on server with API
            if (window.location.hostname !== 'file') {
                // Use server API to generate QR with absolute URL
                fetch('/api/generate-qr-url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        // Clear previous QR code
                        qrContainer.innerHTML = '';
                        
                        // Create new QR code with absolute URL
                        new QRCode(qrContainer, {
                            text: result.qr_url,
                            width: 256,
                            height: 256,
                            colorDark: "#000000",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                        
                        showToast(`QR Code generated! Accessible at: ${result.local_ip}:${result.port}`, 'success');
                    } else {
                        showToast('Error generating QR code: ' + result.error, 'error');
                    }
                })
                .catch(error => {
                    console.error('API Error:', error);
                    showToast('Error: Server not running. Please start the Flask server.', 'error');
                    // Fallback to local generation
                    generateQRCodeLocal(data, qrContainer);
                });
            } else {
                // Fallback for local file access
                generateQRCodeLocal(data, qrContainer);
            }
        }

        function generateQRCodeLocal(data, qrContainer) {
            const qrData = JSON.stringify(data);
            const encodedData = btoa(qrData);
            const viewerURL = `viewer.html?data=${encodeURIComponent(encodedData)}`;
            
            try {
                qrContainer.innerHTML = '';
                new QRCode(qrContainer, {
                    text: viewerURL,
                    width: 256,
                    height: 256,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                showToast('QR Code generated (local mode - may not work on phone if not on network)', 'warning');
            } catch (error) {
                showToast('Error generating QR code!', 'error');
                console.error('QR Error:', error);
            }
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'medical-qr-code.png';
                link.href = canvas.toDataURL();
                link.click();
                showToast('QR Code downloaded! ✓', 'success');
            }
        }

        function goBackToForm() {
            window.location.href = 'sync.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
