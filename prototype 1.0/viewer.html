<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Information - Emergency QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d5a3d 0%, #5a9b6f 100%);
            min-height: 100vh;
            padding: 25px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .viewer-container {
            background: linear-gradient(to bottom, #faf8f5 0%, #f5f3f0 100%);
            border-radius: 22px;
            box-shadow: 0 25px 70px rgba(45, 90, 61, 0.2);
            max-width: 650px;
            width: 100%;
            padding: 55px 50px;
            animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(90, 155, 111, 0.15);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
            border-bottom: 3px solid #3f7d52;
            padding-bottom: 30px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-icon {
            font-size: 56px;
            margin-bottom: 20px;
            animation: bounceIn 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            background: linear-gradient(135deg, #2d5a3d 0%, #3f7d52 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            color: #999;
            font-size: 14px;
            margin-top: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .medical-info {
            display: grid;
            gap: 22px;
            margin-bottom: 40px;
        }

        .info-section {
            background: linear-gradient(135deg, rgba(90, 155, 111, 0.08) 0%, rgba(90, 155, 111, 0.03) 100%);
            border-left: 5px solid #3f7d52;
            border-radius: 12px;
            padding: 25px;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            box-shadow: 0 6px 18px rgba(45, 90, 61, 0.08);
            backdrop-filter: blur(10px);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .info-section:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(45, 90, 61, 0.12);
            background: linear-gradient(135deg, rgba(90, 155, 111, 0.12) 0%, rgba(90, 155, 111, 0.06) 100%);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-section:nth-child(1) { animation-delay: 0.15s; }
        .info-section:nth-child(2) { animation-delay: 0.25s; }
        .info-section:nth-child(3) { animation-delay: 0.35s; }
        .info-section:nth-child(4) { animation-delay: 0.45s; }
        .info-section:nth-child(5) { animation-delay: 0.55s; }

        .info-section.critical {
            border-left-color: #ff5252;
            background: linear-gradient(135deg, rgba(255, 82, 82, 0.08) 0%, rgba(255, 82, 82, 0.03) 100%);
        }

        .info-section.critical:hover {
            box-shadow: 0 12px 28px rgba(255, 82, 82, 0.15);
        }

        .info-section.important {
            border-left-color: #ff9800;
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.08) 0%, rgba(255, 152, 0, 0.03) 100%);
        }

        .info-section.important:hover {
            box-shadow: 0 12px 28px rgba(255, 152, 0, 0.15);
        }

        .info-label {
            font-weight: 800;
            color: #2d5a3d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.95;
        }

        .info-value {
            color: #666;
            font-size: 16px;
            line-height: 1.7;
            word-break: break-word;
            font-weight: 500;
        }

        .empty-value {
            color: #ccc;
            font-style: italic;
            font-weight: 400;
        }

        .icon {
            font-size: 20px;
            width: 22px;
            text-align: center;
        }

        .timestamp {
            background: linear-gradient(135deg, rgba(90, 155, 111, 0.08) 0%, rgba(90, 155, 111, 0.03) 100%);
            padding: 20px;
            border-radius: 12px;
            margin-top: 35px;
            text-align: center;
            color: #999;
            font-size: 12px;
            border: 2px solid rgba(90, 155, 111, 0.15);
            font-weight: 600;
            letter-spacing: 0.3px;
            animation: fadeInUp 0.6s ease-out 0.65s both;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.6s ease-out 0.75s both;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 140px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2d5a3d 0%, #3f7d52 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(45, 90, 61, 0.3);
        }

        .btn-secondary {
            background-color: #f5f3f0;
            color: #2d5a3d;
            border: 2px solid #d9d1c8;
            font-weight: 700;
        }

        .btn-secondary:hover {
            background-color: #e8dcd1;
            border-color: #3f7d52;
            transform: translateY(-2px);
        }

        .error-message {
            background-color: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            color: #856404;
            text-align: center;
            animation: fadeInDown 0.6s ease-out;
        }

        .error-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .alert-box {
            background: linear-gradient(135deg, rgba(255, 152, 0, 0.08) 0%, rgba(255, 152, 0, 0.03) 100%);
            border-left: 5px solid #ff9800;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            color: #856404;
            backdrop-filter: blur(10px);
        }

        .alert-title {
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .print-btn {
            background: linear-gradient(135deg, #2d5a3d 0%, #3f7d52 100%);
            color: white;
        }

        .print-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(45, 90, 61, 0.3);
        }

        @media print {
            body {
                background: white;
            }

            .viewer-container {
                box-shadow: none;
                padding: 20px;
            }

            .action-buttons {
                display: none;
            }

            .alert-box {
                page-break-inside: avoid;
            }
        }

        @media (max-width: 600px) {
            .viewer-container {
                padding: 35px 25px;
                border-radius: 18px;
            }

            h1 {
                font-size: 28px;
            }

            button {
                min-width: 120px;
                padding: 12px 18px;
                font-size: 12px;
            }

            .info-value {
                font-size: 14px;
            }

            .action-buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2d5a3d;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: #999;
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <div class="header">
            <div class="header-icon">🏥</div>
            <h1>Medical Information</h1>
            <p class="header-subtitle">Emergency QR Code Data</p>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading medical information...</p>
        </div>

        <div id="content" style="display: none;">
            <div id="alert-section"></div>
            <div class="medical-info" id="medicalInfo"></div>
            <div class="timestamp" id="timestamp"></div>

            <div class="action-buttons">
                <button class="btn-primary" onclick="downloadPDF()">Download PDF</button>
                <button class="btn-primary" onclick="printMedicalInfo()">Print</button>
                <button class="btn-secondary" onclick="shareInfo()">Share</button>
            </div>
        </div>

        <div id="error" style="display: none;">
            <div class="error-message">
                <div class="error-icon">⚠️</div>
                <h2>Invalid QR Code</h2>
                <p id="errorMessage" style="margin-top: 10px;"></p>
                <button class="btn-secondary" style="margin-top: 15px;" onclick="location.reload()">Try Again</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        let currentMedicalData = null;

        // Decode URL parameter and display medical data
        function loadMedicalData() {
            try {
                // Get the 'data' parameter from URL
                const urlParams = new URLSearchParams(window.location.search);
                const encodedData = urlParams.get('data');

                if (!encodedData) {
                    showError('No medical data found in QR code. The QR code may be invalid.');
                    return;
                }

                // Decode from base64
                const decodedData = atob(encodedData);
                const medicalData = JSON.parse(decodedData);

                // Display the data
                displayMedicalInfo(medicalData);
                currentMedicalData = medicalData;
                hideLoading();

            } catch (error) {
                console.error('Error decoding data:', error);
                showError('Failed to read QR code data. The code may be corrupted or invalid.');
            }
        }

        function displayMedicalInfo(data) {
            const container = document.getElementById('medicalInfo');
            let html = '';

            // Critical allergies alert
            if (data.allergy && data.allergy.trim()) {
                const alertHTML = `
                    <div class="alert-box">
                        <div class="alert-title">⚠️ ALLERGIES</div>
                        <div>${escapeHtml(data.allergy)}</div>
                    </div>
                `;
                document.getElementById('alert-section').innerHTML = alertHTML;
            }

            // Name
            if (data.name && data.name.trim()) {
                html += `
                    <div class="info-section">
                        <div class="info-label"><span class="icon">👤</span>Name</div>
                        <div class="info-value">${escapeHtml(data.name)}</div>
                    </div>
                `;
            }

            // Blood Group
            if (data.blood && data.blood.trim()) {
                html += `
                    <div class="info-section important">
                        <div class="info-label"><span class="icon">🩸</span>Blood Group</div>
                        <div class="info-value">${escapeHtml(data.blood)}</div>
                    </div>
                `;
            }

            // Medical Conditions
            if (data.condition && data.condition.trim()) {
                html += `
                    <div class="info-section">
                        <div class="info-label"><span class="icon">⚕️</span>Medical Conditions</div>
                        <div class="info-value">${escapeHtml(data.condition)}</div>
                    </div>
                `;
            }

            // Emergency Contact
            if (data.contact && data.contact.trim()) {
                html += `
                    <div class="info-section">
                        <div class="info-label"><span class="icon">📞</span>Emergency Contact</div>
                        <div class="info-value">${escapeHtml(data.contact)}</div>
                    </div>
                `;
            }

            // Timestamp
            if (data.timestamp) {
                const date = new Date(data.timestamp);
                const formattedDate = date.toLocaleString();
                document.getElementById('timestamp').textContent = `QR Code Generated: ${formattedDate}`;
            }

            container.innerHTML = html || '<p style="color: #999;">No medical information available.</p>';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function printMedicalInfo() {
            window.print();
        }

        function shareInfo() {
            if (navigator.share) {
                navigator.share({
                    title: 'Medical Information',
                    text: 'Emergency Medical Information via QR Code',
                    url: window.location.href
                }).catch(err => console.log('Share error:', err));
            } else {
                // Fallback: copy URL to clipboard
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('Link copied to clipboard!');
                }).catch(() => {
                    alert('Unable to share. Please manually share this link.');
                });
            }
        }

        function downloadPDF() {
            if (!currentMedicalData) {
                alert('No medical data available to download.');
                return;
            }

            const element = document.getElementById('medicalInfo');
            const opt = {
                margin: 10,
                filename: 'Medical_Information.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };

            // Create a temporary container for PDF content
            const pdfContent = document.createElement('div');
            pdfContent.style.padding = '20px';
            pdfContent.style.fontFamily = 'Arial, sans-serif';

            // Add header
            const header = document.createElement('h1');
            header.textContent = 'EMERGENCY MEDICAL INFORMATION';
            header.style.textAlign = 'center';
            header.style.color = '#667eea';
            header.style.marginBottom = '10px';
            pdfContent.appendChild(header);

            const subheader = document.createElement('p');
            subheader.textContent = 'QR Code Emergency Medical ID';
            subheader.style.textAlign = 'center';
            subheader.style.color = '#999';
            subheader.style.marginBottom = '20px';
            pdfContent.appendChild(subheader);

            // Add separator
            const separator = document.createElement('hr');
            separator.style.border = 'none';
            separator.style.borderTop = '2px solid #667eea';
            separator.style.marginBottom = '20px';
            pdfContent.appendChild(separator);

            // Add medical information
            const infoDiv = document.createElement('div');
            infoDiv.style.marginBottom = '20px';

            // Add allergies alert if present
            if (currentMedicalData.allergy && currentMedicalData.allergy.trim()) {
                const alertDiv = document.createElement('div');
                alertDiv.style.backgroundColor = '#fff3cd';
                alertDiv.style.border = '2px solid #ff9800';
                alertDiv.style.borderRadius = '5px';
                alertDiv.style.padding = '15px';
                alertDiv.style.marginBottom = '20px';

                const alertTitle = document.createElement('strong');
                alertTitle.textContent = '⚠️ ALLERGIES: ';
                alertTitle.style.color = '#856404';
                alertDiv.appendChild(alertTitle);

                const alertText = document.createElement('span');
                alertText.textContent = currentMedicalData.allergy;
                alertText.style.color = '#856404';
                alertDiv.appendChild(alertText);

                infoDiv.appendChild(alertDiv);
            }

            // Add name
            if (currentMedicalData.name && currentMedicalData.name.trim()) {
                const nameDiv = document.createElement('p');
                nameDiv.innerHTML = `<strong>Name:</strong> ${escapeHtml(currentMedicalData.name)}`;
                nameDiv.style.marginBottom = '10px';
                nameDiv.style.fontSize = '14px';
                infoDiv.appendChild(nameDiv);
            }

            // Add blood group
            if (currentMedicalData.blood && currentMedicalData.blood.trim()) {
                const bloodDiv = document.createElement('p');
                bloodDiv.innerHTML = `<strong>Blood Group:</strong> ${escapeHtml(currentMedicalData.blood)}`;
                bloodDiv.style.marginBottom = '10px';
                bloodDiv.style.fontSize = '14px';
                bloodDiv.style.backgroundColor = '#fff3cd';
                bloodDiv.style.padding = '10px';
                bloodDiv.style.borderRadius = '5px';
                infoDiv.appendChild(bloodDiv);
            }

            // Add medical conditions
            if (currentMedicalData.condition && currentMedicalData.condition.trim()) {
                const conditionDiv = document.createElement('p');
                conditionDiv.innerHTML = `<strong>Medical Conditions:</strong> ${escapeHtml(currentMedicalData.condition)}`;
                conditionDiv.style.marginBottom = '10px';
                conditionDiv.style.fontSize = '14px';
                infoDiv.appendChild(conditionDiv);
            }

            // Add emergency contact
            if (currentMedicalData.contact && currentMedicalData.contact.trim()) {
                const contactDiv = document.createElement('p');
                contactDiv.innerHTML = `<strong>Emergency Contact:</strong> ${escapeHtml(currentMedicalData.contact)}`;
                contactDiv.style.marginBottom = '10px';
                contactDiv.style.fontSize = '14px';
                infoDiv.appendChild(contactDiv);
            }

            pdfContent.appendChild(infoDiv);

            // Add timestamp
            if (currentMedicalData.timestamp) {
                const date = new Date(currentMedicalData.timestamp);
                const formattedDate = date.toLocaleString();

                const footerDiv = document.createElement('div');
                footerDiv.style.marginTop = '40px';
                footerDiv.style.paddingTop = '20px';
                footerDiv.style.borderTop = '1px solid #ddd';
                footerDiv.style.fontSize = '11px';
                footerDiv.style.color = '#999';
                footerDiv.style.textAlign = 'center';
                footerDiv.innerHTML = `Generated: ${formattedDate}<br/>Emergency Medical ID - Keep this document safe`;
                pdfContent.appendChild(footerDiv);
            }

            // Generate PDF
            html2pdf().set(opt).from(pdfContent).save();
        }

        // Load data when page loads
        window.addEventListener('DOMContentLoaded', loadMedicalData);
    </script>
</body>
</html>
